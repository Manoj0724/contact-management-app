services:

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:6
    container_name: contacts_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: contactsdb
    restart: unless-stopped
    networks:
      - contacts_net

  # ── Backend (Fastify) ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: contacts_backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/contactsdb
      - PORT=5000
      - NODE_ENV=production
    depends_on:
      - mongodb
    restart: unless-stopped
    networks:
      - contacts_net

  # ── Frontend (React + Nginx) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./contacts-react
      dockerfile: Dockerfile
    container_name: contacts_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - contacts_net

volumes:
  mongo_data:
    driver: local

networks:
  contacts_net:
    driver: bridge